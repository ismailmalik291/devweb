<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevWeb — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#060609;color:#fff;
  font-family:'Geist',sans-serif;
  min-height:100vh;display:flex;
  align-items:center;justify-content:center;
  padding:24px;
}
.card{
  background:#0d0d12;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:20px;padding:40px;
  width:100%;max-width:400px;
}
.logo{
  font-family:'Instrument Serif',serif;
  font-size:1.6rem;text-align:center;
  margin-bottom:8px;
}
.subtitle{
  text-align:center;font-size:0.85rem;
  color:#52526e;margin-bottom:32px;
  font-weight:300;
}
.tabs{
  display:grid;grid-template-columns:1fr 1fr;
  background:#12121a;border-radius:10px;
  padding:4px;margin-bottom:28px;gap:4px;
}
.tab{
  padding:10px;border:none;border-radius:8px;
  background:transparent;color:#52526e;
  font-family:'Geist',sans-serif;font-size:0.85rem;
  cursor:pointer;transition:all 0.2s;font-weight:500;
}
.tab.active{background:#1a1a24;color:#fff;}
.field{margin-bottom:16px;}
label{
  display:block;font-size:0.75rem;
  color:#52526e;margin-bottom:6px;
  letter-spacing:0.5px;text-transform:uppercase;
  font-weight:600;
}
input{
  width:100%;background:#12121a;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:10px;color:#fff;
  font-family:'Geist',sans-serif;
  font-size:0.9rem;padding:13px 16px;
  outline:none;transition:border 0.2s;
}
input:focus{border-color:rgba(79,111,255,0.4);}
input::placeholder{color:#2a2a3d;}
.btn{
  width:100%;padding:14px;
  background:#fff;color:#000;
  border:none;border-radius:10px;
  font-family:'Geist',sans-serif;
  font-size:0.9rem;font-weight:600;
  cursor:pointer;transition:all 0.2s;
  margin-top:8px;
}
.btn:hover{background:rgba(255,255,255,0.9);}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.divider{
  display:flex;align-items:center;
  gap:12px;margin:20px 0;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:rgba(255,255,255,0.06);
}
.divider span{font-size:0.75rem;color:#52526e;}
.google-btn{
  width:100%;padding:13px;
  background:transparent;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;color:#fff;
  font-family:'Geist',sans-serif;
  font-size:0.88rem;cursor:pointer;
  transition:all 0.2s;
  display:flex;align-items:center;
  justify-content:center;gap:10px;
}
.google-btn:hover{border-color:rgba(255,255,255,0.2);}
.msg{
  margin-top:16px;padding:12px;
  border-radius:8px;font-size:0.82rem;
  text-align:center;display:none;
}
.msg.error{background:rgba(255,50,50,0.1);color:#ff6b6b;border:1px solid rgba(255,50,50,0.2);}
.msg.success{background:rgba(50,255,100,0.1);color:#4ade80;border:1px solid rgba(50,255,100,0.2);}
.back{
  text-align:center;margin-top:20px;
  font-size:0.8rem;color:#52526e;
}
.back a{color:#4f6fff;text-decoration:none;}
</style>
</head>
<body>

<div class="card">
  <div class="logo">DevWeb</div>
  <div class="subtitle">Build websites with AI</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Sign in</button>
    <button class="tab" onclick="switchTab('signup')">Sign up</button>
  </div>

  <!-- LOGIN -->
  <div id="login-form">
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••">
    </div>
    <button class="btn" id="login-btn" onclick="login()">Sign in</button>

    <div class="divider"><span>or</span></div>
    <button class="google-btn" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.3z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- SIGNUP -->
  <div id="signup-form" style="display:none">
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="signup-name" placeholder="Ismail Malik">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signup-pass" placeholder="Min 6 characters">
    </div>
    <button class="btn" id="signup-btn" onclick="signup()">Create account — Free</button>

    <div class="divider"><span>or</span></div>
    <button class="google-btn" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.3z"/></svg>
      Continue with Google
    </button>
  </div>

  <div class="msg" id="msg"></div>
  <div class="back"><a href="index.html">← Back to home</a></div>
</div>

<script>
// Init Supabase
const supabase = window.supabase.createClient(
  CONFIG.SUPABASE_URL,
  CONFIG.SUPABASE_ANON_KEY
);

// Check if already logged in
supabase.auth.getSession().then(({ data }) => {
  if(data.session) window.location.href = 'dashboard.html';
});

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
  hideMsg();
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = `msg ${type}`;
  el.style.display = 'block';
}
function hideMsg() {
  document.getElementById('msg').style.display = 'none';
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if(!email || !pass) { showMsg('Please fill all fields', 'error'); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in...';

  const { error } = await supabase.auth.signInWithPassword({ email, password: pass });

  if(error) {
    showMsg(error.message, 'error');
    btn.disabled = false; btn.textContent = 'Sign in';
  } else {
    window.location.href = 'dashboard.html';
  }
}

async function signup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass = document.getElementById('signup-pass').value;

  if(!name || !email || !pass) { showMsg('Please fill all fields', 'error'); return; }
  if(pass.length < 6) { showMsg('Password must be at least 6 characters', 'error'); return; }

  const btn = document.getElementById('signup-btn');
  btn.disabled = true; btn.textContent = 'Creating account...';

  const { data, error } = await supabase.auth.signUp({
    email, password: pass,
    options: { data: { name } }
  });

  if(error) {
    showMsg(error.message, 'error');
    btn.disabled = false; btn.textContent = 'Create account — Free';
  } else {
    // Insert user into users table
    await supabase.from('users').insert({
      id: data.user.id,
      email: email,
      name: name,
      plan: 'free'
    });
    showMsg('Account created! Check your email to verify.', 'success');
    btn.textContent = 'Check your email ✓';
  }
}

async function googleLogin() {
  await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/dashboard.html' }
  });
}

// Enter key
document.addEventListener('keydown', e => {
  if(e.key === 'Enter') {
    const loginVisible = document.getElementById('login-form').style.display !== 'none';
    if(loginVisible) login(); else signup();
  }
});
</script>
</body>
</html>
